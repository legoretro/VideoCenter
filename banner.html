<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video Banner</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #000000;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      display: block;
      background: #000000;
      object-fit: cover;
    }

    .message {
      min-height: 100vh;
      display: none;
      place-items: center;
      padding: 24px;
      color: #ffffff;
      font: 600 16px/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
    }

    .message.show {
      display: grid;
    }
  </style>
</head>
<body>
  <video id="video" autoplay muted loop playsinline preload="auto">
    <source id="source">
  </video>
  <div class="message" id="message">The banner video could not be loaded.</div>

  <script>
    const params = new URLSearchParams(location.search);
    const video = document.querySelector("#video");
    const source = document.querySelector("#source");
    const message = document.querySelector("#message");
    const videoValue = params.get("v") || params.get("src") || params.get("video");
    const title = params.get("title") || "Video Banner";
    const fit = params.get("fit");

    function mimeFor(url) {
      const clean = url.split("?")[0].toLowerCase();
      if (clean.endsWith(".webm")) return "video/webm";
      if (clean.endsWith(".ogv") || clean.endsWith(".ogg")) return "video/ogg";
      return "video/mp4";
    }

    function showMessage() {
      video.style.display = "none";
      message.classList.add("show");
    }

    if (!videoValue) {
      showMessage();
    } else {
      document.title = title;
      if (fit === "contain") video.style.objectFit = "contain";
      source.src = new URL(videoValue, location.href).href;
      source.type = mimeFor(videoValue);
      video.load();
      video.play().catch(() => {
        video.muted = true;
        video.play().catch(showMessage);
      });
    }

    video.addEventListener("error", showMessage);
  </script>
</body>
</html>
