<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VideoCenter</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #16201d;
      --muted: #5d6764;
      --line: #d7dfdc;
      --paper: #f4f7f2;
      --panel: #ffffff;
      --accent: #0d766f;
      --accent-dark: #095a55;
      --focus: rgba(13, 118, 111, 0.18);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--paper);
      color: var(--ink);
    }

    main {
      width: min(760px, calc(100% - 28px));
      margin: 0 auto;
      padding: 44px 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
    }

    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(1.7rem, 5vw, 2.35rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    p {
      color: var(--muted);
      line-height: 1.45;
      margin-top: 7px;
    }

    .upload {
      flex: 0 0 auto;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 7px;
      background: var(--accent);
      color: #ffffff;
      text-decoration: none;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .upload:hover {
      background: var(--accent-dark);
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 750;
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      min-height: 46px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--ink);
      background: #ffffff;
      font: inherit;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--focus);
    }

    .result {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: stretch;
      margin-top: 12px;
    }

    .url {
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #edf5f2;
      display: flex;
      align-items: center;
      padding: 0 12px;
      overflow: hidden;
      color: #24302d;
      font-size: 0.94rem;
    }

    .url span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    button {
      appearance: none;
      border: 1px solid var(--accent);
      border-radius: 7px;
      background: #ffffff;
      color: var(--accent-dark);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      padding: 0 14px;
      min-height: 48px;
      white-space: nowrap;
    }

    button:hover {
      background: #edf5f2;
    }

    .secondary {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .small {
      font-size: 0.88rem;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(14px);
      opacity: 0;
      pointer-events: none;
      background: #16201d;
      color: #ffffff;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 800;
      transition: 160ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 620px) {
      main {
        padding: 20px 0;
      }

      .top {
        display: grid;
      }

      .upload,
      .result,
      button {
        width: 100%;
      }

      .result {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <div class="top">
        <div>
          <h1>VideoCenter</h1>
          <p>Upload an MP4, type its filename, copy the HTTPS link.</p>
        </div>
        <a class="upload" href="https://github.com/legoretro/VideoCenter/upload/main/videos">Upload video</a>
      </div>

      <label>
        Video filename
        <input id="filename" value="your-video.mp4" autocomplete="off" spellcheck="false">
      </label>

      <div class="result">
        <div class="url"><span id="directUrl"></span></div>
        <button id="copyDirect" type="button">Copy link</button>
      </div>

      <div class="secondary">
        <p class="small">Optional clean player page for Genially embed:</p>
        <div class="result">
          <div class="url"><span id="playerUrl"></span></div>
          <button id="copyPlayer" type="button">Copy player</button>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite">Copied</div>

  <script>
    const base = "https://legoretro.github.io/VideoCenter/";
    const filename = document.querySelector("#filename");
    const directUrl = document.querySelector("#directUrl");
    const playerUrl = document.querySelector("#playerUrl");
    const toast = document.querySelector("#toast");

    function cleanFilename(value) {
      const trimmed = value.trim().replace(/^\/+/, "");
      if (!trimmed) return "your-video.mp4";
      return trimmed.startsWith("videos/") ? trimmed.slice(7) : trimmed;
    }

    function urls() {
      const file = cleanFilename(filename.value);
      const direct = base + "videos/" + encodeURI(file);
      return {
        direct,
        player: base + "player.html?v=" + encodeURIComponent("videos/" + file)
      };
    }

    function render() {
      const current = urls();
      directUrl.textContent = current.direct;
      playerUrl.textContent = current.player;
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast("Copied");
      } catch {
        showToast("Select the link to copy");
      }
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1400);
    }

    filename.addEventListener("input", render);
    document.querySelector("#copyDirect").addEventListener("click", () => copy(urls().direct));
    document.querySelector("#copyPlayer").addEventListener("click", () => copy(urls().player));
    render();
  </script>
</body>
</html>
