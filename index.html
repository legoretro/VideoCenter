<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VideoCenter</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #16201d;
      --muted: #5d6764;
      --line: #d7dfdc;
      --paper: #f4f7f2;
      --panel: #ffffff;
      --soft: #edf5f2;
      --accent: #0d766f;
      --accent-dark: #095a55;
      --focus: rgba(13, 118, 111, 0.18);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--paper);
      color: var(--ink);
    }

    main {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 34px 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
    }

    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(1.7rem, 5vw, 2.35rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    h2 {
      font-size: 1.05rem;
      letter-spacing: 0;
      margin-bottom: 10px;
    }

    p {
      color: var(--muted);
      line-height: 1.45;
      margin-top: 7px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      flex: 0 0 auto;
    }

    a.button,
    button {
      appearance: none;
      min-height: 44px;
      border: 1px solid var(--accent);
      border-radius: 7px;
      padding: 0 14px;
      background: #ffffff;
      color: var(--accent-dark);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    a.button.primary,
    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    a.button:hover,
    button:hover {
      background: var(--soft);
    }

    a.button.primary:hover,
    button.primary:hover {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
    }

    .status {
      border: 1px dashed var(--line);
      border-radius: 7px;
      color: var(--muted);
      padding: 14px;
      line-height: 1.4;
    }

    .video-list {
      display: grid;
      gap: 10px;
    }

    .video-row {
      display: grid;
      grid-template-columns: minmax(180px, 0.75fr) minmax(0, 1.15fr) auto auto auto auto;
      gap: 10px;
      align-items: stretch;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #ffffff;
    }

    .name,
    .url {
      min-height: 44px;
      display: flex;
      align-items: center;
      min-width: 0;
      overflow: hidden;
    }

    .name {
      color: var(--ink);
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .url {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--soft);
      color: #24302d;
      padding: 0 12px;
      font-size: 0.93rem;
    }

    .url span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .note {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(14px);
      opacity: 0;
      pointer-events: none;
      background: #16201d;
      color: #ffffff;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 800;
      transition: 160ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 780px) {
      .top {
        display: grid;
      }

      .actions {
        justify-content: stretch;
      }

      a.button,
      button {
        width: 100%;
      }

      .video-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <div class="top">
        <div>
          <h1>VideoCenter</h1>
          <p>Open this page anywhere, copy the video or Genially embed you need.</p>
        </div>
        <div class="actions">
          <a class="button primary" href="https://github.com/legoretro/VideoCenter/upload/main/videos">Upload videos</a>
          <button id="refresh" type="button">Refresh list</button>
          <button id="copyAll" type="button">Copy all URLs</button>
          <button id="copyAllEmbeds" type="button">Copy all embeds</button>
        </div>
      </div>

      <h2>My Videos</h2>
      <div id="videoList" class="video-list" aria-live="polite">
        <div class="status">Loading videos...</div>
      </div>

      <div class="note">
        For Genially, use Copy embed code if adding the plain URL shows null.
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite">Copied</div>

  <script>
    const base = "https://legoretro.github.io/VideoCenter/";
    const api = "https://api.github.com/repos/legoretro/VideoCenter/contents/videos?ref=main";
    const videoList = document.querySelector("#videoList");
    const toast = document.querySelector("#toast");
    let currentLinks = [];
    let currentEmbeds = [];

    function encodePath(file) {
      return file.split("/").map((part) => encodeURIComponent(part)).join("/");
    }

    function isVideo(name) {
      return /\.(mp4|mov|webm|m4v|ogv|ogg)$/i.test(name);
    }

    function videoUrl(name) {
      return base + "videos/" + encodePath(name);
    }

    function playerUrl(name) {
      return base + "player.html?v=" + encodeURIComponent("videos/" + name);
    }

    function embedCode(name) {
      return '<iframe src="' + playerUrl(name) + '" style="width:100%;aspect-ratio:16/9;border:0;" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>';
    }

    function status(text) {
      videoList.innerHTML = "";
      const box = document.createElement("div");
      box.className = "status";
      box.textContent = text;
      videoList.append(box);
    }

    function render(files) {
      videoList.innerHTML = "";
      currentLinks = files.map((file) => videoUrl(file.name));
      currentEmbeds = files.map((file) => embedCode(file.name));

      if (files.length === 0) {
        status("No videos uploaded yet. Use Upload videos, then refresh this page.");
        return;
      }

      files.forEach((file) => {
        const link = videoUrl(file.name);
        const player = playerUrl(file.name);
        const embed = embedCode(file.name);
        const row = document.createElement("div");
        row.className = "video-row";

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = file.name;

        const url = document.createElement("div");
        url.className = "url";
        const urlText = document.createElement("span");
        urlText.textContent = link;
        url.append(urlText);

        const copyButton = document.createElement("button");
        copyButton.type = "button";
        copyButton.textContent = "Copy URL";
        copyButton.addEventListener("click", () => copy(link));

        const geniallyButton = document.createElement("button");
        geniallyButton.type = "button";
        geniallyButton.textContent = "Genially URL";
        geniallyButton.addEventListener("click", () => copy(player));

        const embedButton = document.createElement("button");
        embedButton.type = "button";
        embedButton.textContent = "Embed code";
        embedButton.addEventListener("click", () => copy(embed));

        const openButton = document.createElement("a");
        openButton.className = "button";
        openButton.href = link;
        openButton.target = "_blank";
        openButton.rel = "noopener";
        openButton.textContent = "Open";

        row.append(name, url, copyButton, geniallyButton, embedButton, openButton);
        videoList.append(row);
      });
    }

    async function loadVideos() {
      status("Loading videos...");
      try {
        const response = await fetch(api, { cache: "no-store" });
        if (!response.ok) throw new Error("Could not load videos");
        const items = await response.json();
        const files = items
          .filter((item) => item.type === "file" && isVideo(item.name))
          .sort((a, b) => a.name.localeCompare(b.name));
        render(files);
      } catch {
        status("Could not load the video list. Use the direct pattern below with the exact filename.");
      }
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast("Copied");
      } catch {
        showToast("Select the link to copy");
      }
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1400);
    }

    document.querySelector("#refresh").addEventListener("click", loadVideos);
    document.querySelector("#copyAll").addEventListener("click", () => {
      if (currentLinks.length === 0) {
        showToast("No links yet");
        return;
      }
      copy(currentLinks.join("\n"));
    });
    document.querySelector("#copyAllEmbeds").addEventListener("click", () => {
      if (currentEmbeds.length === 0) {
        showToast("No embeds yet");
        return;
      }
      copy(currentEmbeds.join("\n\n"));
    });

    loadVideos();
  </script>
</body>
</html>
