<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VideoCenter</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #16201d;
      --muted: #5d6764;
      --line: #d7dfdc;
      --paper: #f4f7f2;
      --panel: #ffffff;
      --soft: #edf5f2;
      --accent: #0d766f;
      --accent-dark: #095a55;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--paper);
      color: var(--ink);
    }

    main {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 34px 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
    }

    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(1.7rem, 5vw, 2.35rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    h2 {
      font-size: 1.05rem;
      letter-spacing: 0;
      margin-bottom: 10px;
    }

    p {
      color: var(--muted);
      line-height: 1.45;
      margin-top: 7px;
    }

    .actions,
    .row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .actions {
      justify-content: flex-end;
      flex: 0 0 auto;
    }

    a.button,
    button {
      appearance: none;
      min-height: 44px;
      border: 1px solid var(--accent);
      border-radius: 7px;
      padding: 0 14px;
      background: #ffffff;
      color: var(--accent-dark);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    a.button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    a.button:hover,
    button:hover {
      background: var(--soft);
    }

    a.button.primary:hover {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
    }

    .status {
      border: 1px dashed var(--line);
      border-radius: 7px;
      color: var(--muted);
      padding: 14px;
      line-height: 1.4;
    }

    .video-list {
      display: grid;
      gap: 10px;
    }

    .video-row {
      display: grid;
      grid-template-columns: minmax(210px, 0.8fr) minmax(280px, 1fr) minmax(360px, auto);
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #ffffff;
    }

    .name,
    .url {
      min-width: 0;
      overflow: hidden;
    }

    .name {
      color: var(--ink);
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .url {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--soft);
      color: #24302d;
      padding: 0 12px;
      display: flex;
      align-items: center;
      font-size: 0.93rem;
    }

    .url span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .note {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(14px);
      opacity: 0;
      pointer-events: none;
      background: #16201d;
      color: #ffffff;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 800;
      transition: 160ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 920px) {
      .top {
        display: grid;
      }

      .actions,
      .row-actions {
        justify-content: stretch;
      }

      a.button,
      button {
        width: 100%;
      }

      .video-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <div class="top">
        <div>
          <h1>VideoCenter</h1>
          <p>Open anywhere. Copy an autoplay loop player or Genially embed.</p>
        </div>
        <div class="actions">
          <a class="button primary" href="https://github.com/legoretro/VideoCenter/upload/main/videos">Upload</a>
          <a class="button" href="https://github.com/legoretro/VideoCenter/tree/main/videos">Manage files</a>
          <button id="refresh" type="button">Refresh</button>
          <button id="copyAllPlayers" type="button">Copy autoplay links</button>
          <button id="copyAllEmbeds" type="button">Copy all embeds</button>
        </div>
      </div>

      <h2>My Videos</h2>
      <div id="videoList" class="video-list" aria-live="polite">
        <div class="status">Loading videos...</div>
      </div>

      <div class="note">
        Genially: use <strong>Embed code</strong> first. It autoplays, loops, is muted, and hides controls. Browsers usually block autoplay with sound.
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite">Copied</div>

  <script>
    const base = "https://legoretro.github.io/VideoCenter/";
    const api = "https://api.github.com/repos/legoretro/VideoCenter/contents/videos?ref=main";
    const videoList = document.querySelector("#videoList");
    const toast = document.querySelector("#toast");
    let currentPlayers = [];
    let currentEmbeds = [];

    function encodePath(file) {
      return file.split("/").map((part) => encodeURIComponent(part)).join("/");
    }

    function isVideo(name) {
      return /\.(mp4|mov|webm|m4v|ogv|ogg)$/i.test(name);
    }

    function rawFallback(file) {
      return "https://raw.githubusercontent.com/legoretro/VideoCenter/main/" + encodePath(file.path || ("videos/" + file.name));
    }

    function sourceUrl(file) {
      return file.download_url || rawFallback(file);
    }

    function playerUrl(file) {
      const params = new URLSearchParams();
      params.set("v", sourceUrl(file));
      params.set("title", file.name);
      params.set("autoplay", "1");
      params.set("muted", "1");
      params.set("loop", "1");
      params.set("controls", "0");
      return base + "player.html?" + params.toString();
    }

    function embedCode(file) {
      return '<iframe src="' + playerUrl(file) + '" style="width:100%;aspect-ratio:16/9;border:0;" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>';
    }

    function githubUrl(file) {
      return file.html_url || "https://github.com/legoretro/VideoCenter/blob/main/" + encodePath(file.path || ("videos/" + file.name));
    }

    function status(text) {
      videoList.innerHTML = "";
      const box = document.createElement("div");
      box.className = "status";
      box.textContent = text;
      videoList.append(box);
    }

    function render(files) {
      videoList.innerHTML = "";
      currentPlayers = files.map((file) => playerUrl(file));
      currentEmbeds = files.map((file) => embedCode(file));

      if (files.length === 0) {
        status("No videos found yet. Upload videos, wait for GitHub to finish, then refresh.");
        return;
      }

      files.forEach((file) => {
        const player = playerUrl(file);
        const source = sourceUrl(file);
        const embed = embedCode(file);
        const row = document.createElement("div");
        row.className = "video-row";

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = file.name;

        const url = document.createElement("div");
        url.className = "url";
        const urlText = document.createElement("span");
        urlText.textContent = player;
        url.append(urlText);

        const actions = document.createElement("div");
        actions.className = "row-actions";

        const playerButton = document.createElement("button");
        playerButton.type = "button";
        playerButton.textContent = "Autoplay URL";
        playerButton.addEventListener("click", () => copy(player));

        const embedButton = document.createElement("button");
        embedButton.type = "button";
        embedButton.textContent = "Embed code";
        embedButton.addEventListener("click", () => copy(embed));

        const fileButton = document.createElement("button");
        fileButton.type = "button";
        fileButton.textContent = "Copy file";
        fileButton.addEventListener("click", () => copy(source));

        const openButton = document.createElement("a");
        openButton.className = "button";
        openButton.href = player;
        openButton.target = "_blank";
        openButton.rel = "noopener";
        openButton.textContent = "Open";

        const manageButton = document.createElement("a");
        manageButton.className = "button";
        manageButton.href = githubUrl(file);
        manageButton.target = "_blank";
        manageButton.rel = "noopener";
        manageButton.textContent = "Manage";

        actions.append(playerButton, embedButton, fileButton, openButton, manageButton);
        row.append(name, url, actions);
        videoList.append(row);
      });
    }

    async function loadVideos() {
      status("Loading videos...");
      try {
        const response = await fetch(api, { cache: "no-store" });
        if (!response.ok) throw new Error("Could not load videos");
        const items = await response.json();
        const files = items
          .filter((item) => item.type === "file" && isVideo(item.name))
          .sort((a, b) => a.name.localeCompare(b.name));
        render(files);
      } catch {
        status("Could not load the video list. Refresh in a minute, or use Manage files to confirm the upload.");
      }
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast("Copied");
      } catch {
        showToast("Select the text to copy");
      }
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1400);
    }

    document.querySelector("#refresh").addEventListener("click", loadVideos);
    document.querySelector("#copyAllPlayers").addEventListener("click", () => {
      if (currentPlayers.length === 0) {
        showToast("No players yet");
        return;
      }
      copy(currentPlayers.join("\n"));
    });
    document.querySelector("#copyAllEmbeds").addEventListener("click", () => {
      if (currentEmbeds.length === 0) {
        showToast("No embeds yet");
        return;
      }
      copy(currentEmbeds.join("\n\n"));
    });

    loadVideos();
  </script>
</body>
</html>
