<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VideoCenter</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #16201d;
      --muted: #5d6764;
      --line: #d7dfdc;
      --paper: #f4f7f2;
      --panel: #ffffff;
      --accent: #0d766f;
      --accent-dark: #095a55;
      --focus: rgba(13, 118, 111, 0.18);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--paper);
      color: var(--ink);
    }

    main {
      width: min(820px, calc(100% - 28px));
      margin: 0 auto;
      padding: 44px 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
    }

    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(1.7rem, 5vw, 2.35rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    p {
      color: var(--muted);
      line-height: 1.45;
      margin-top: 7px;
    }

    .upload {
      flex: 0 0 auto;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 7px;
      background: var(--accent);
      color: #ffffff;
      text-decoration: none;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }

    .upload:hover {
      background: var(--accent-dark);
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 750;
      margin-bottom: 14px;
    }

    textarea {
      width: 100%;
      min-height: 150px;
      resize: vertical;
      padding: 12px 13px;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--ink);
      background: #ffffff;
      font: inherit;
      line-height: 1.45;
      outline: none;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--focus);
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 16px;
    }

    button {
      appearance: none;
      border: 1px solid var(--accent);
      border-radius: 7px;
      background: #ffffff;
      color: var(--accent-dark);
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      padding: 0 14px;
      min-height: 44px;
      white-space: nowrap;
    }

    button:hover {
      background: #edf5f2;
    }

    .results {
      display: grid;
      gap: 10px;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 7px;
      color: var(--muted);
      padding: 14px;
      line-height: 1.4;
    }

    .result {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: stretch;
    }

    .url {
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #edf5f2;
      display: flex;
      align-items: center;
      padding: 0 12px;
      overflow: hidden;
      color: #24302d;
      font-size: 0.94rem;
    }

    .url span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%) translateY(14px);
      opacity: 0;
      pointer-events: none;
      background: #16201d;
      color: #ffffff;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 800;
      transition: 160ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 620px) {
      main {
        padding: 20px 0;
      }

      .top {
        display: grid;
      }

      .upload,
      .result,
      .toolbar,
      button {
        width: 100%;
      }

      .toolbar,
      .result {
        grid-template-columns: 1fr;
      }

      .toolbar {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <div class="top">
        <div>
          <h1>VideoCenter</h1>
          <p>Upload videos, paste exact filenames one per line, copy HTTPS links.</p>
        </div>
        <a class="upload" href="https://github.com/legoretro/VideoCenter/upload/main/videos">Upload videos</a>
      </div>

      <label>
        Video filenames
        <textarea id="filenames" spellcheck="false" placeholder="Video_HLA_Genotype_Matches.mov&#10;another-video.mp4&#10;third-video.mp4"></textarea>
      </label>

      <div class="toolbar">
        <button id="copyAll" type="button">Copy all links</button>
      </div>

      <div class="results" id="results" aria-live="polite"></div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite">Copied</div>

  <script>
    const base = "https://legoretro.github.io/VideoCenter/";
    const filenames = document.querySelector("#filenames");
    const results = document.querySelector("#results");
    const toast = document.querySelector("#toast");

    function cleanFilename(value) {
      let file = value.trim();
      file = file.replace(/^https:\/\/legoretro\.github\.io\/VideoCenter\/videos\//i, "");
      file = file.replace(/^\/+/, "");
      file = file.startsWith("videos/") ? file.slice(7) : file;
      return file;
    }

    function encodePath(file) {
      return file.split("/").map((part) => encodeURIComponent(part)).join("/");
    }

    function links() {
      const seen = new Set();
      return filenames.value
        .split(/\r?\n/)
        .map(cleanFilename)
        .filter(Boolean)
        .filter((file) => {
          const key = file.toLowerCase();
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        })
        .map((file) => base + "videos/" + encodePath(file));
    }

    function render() {
      const currentLinks = links();
      results.innerHTML = "";

      if (currentLinks.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Paste exact uploaded filenames here, one per line.";
        results.append(empty);
        return;
      }

      currentLinks.forEach((link) => {
        const row = document.createElement("div");
        row.className = "result";

        const box = document.createElement("div");
        box.className = "url";

        const text = document.createElement("span");
        text.textContent = link;
        box.append(text);

        const button = document.createElement("button");
        button.type = "button";
        button.textContent = "Copy";
        button.addEventListener("click", () => copy(link));

        row.append(box, button);
        results.append(row);
      });
    }

    async function copy(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast("Copied");
      } catch {
        showToast("Select the link to copy");
      }
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1400);
    }

    filenames.addEventListener("input", render);
    document.querySelector("#copyAll").addEventListener("click", () => copy(links().join("\n")));
    render();
  </script>
</body>
</html>
